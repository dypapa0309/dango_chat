<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DD MOVE OS | 예약금 결제</title>
  <script src="https://js.tosspayments.com/v1"></script>
  <style>
    body{font-family:Arial,sans-serif;padding:24px;background:#f8fafc;color:#0f172a}
    .card{max-width:560px;margin:0 auto;background:#fff;padding:24px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    h1{margin:0 0 8px}
    .row{margin:10px 0;color:#334155}
    .price{font-size:28px;font-weight:700;margin:14px 0}
    button{padding:14px 16px;border:none;border-radius:10px;background:#0f766e;color:#fff;cursor:pointer;width:100%;font-size:16px}
    button[disabled]{opacity:.5;cursor:not-allowed}
    .muted{font-size:13px;color:#64748b}
  </style>
</head>
<body>
  <div class="card">
    <h1>예약금 결제</h1>
    <p class="muted">배포 후 바로 테스트할 수 있게 구성되어 있습니다.</p>
    <div id="summary" class="row">불러오는 중...</div>
    <div id="price" class="price">-</div>
    <button id="btnPay" disabled>결제하기</button>
    <p class="muted">토스 테스트 키가 없으면 결제창은 열리지 않습니다. 대신 로컬/검증용으로 mock 승인 흐름은 success 페이지에서 동작합니다.</p>
  </div>
  <script>
    let job = null;
    let clientKey = '';

    async function load() {
      const jobId = new URLSearchParams(location.search).get('jobId');
      if (!jobId) {
        document.getElementById('summary').textContent = 'jobId가 없습니다.';
        return;
      }

      const detailRes = await fetch(`/.netlify/functions/get-job-detail?jobId=${encodeURIComponent(jobId)}`);
      const detailJson = await detailRes.json();
      if (!detailJson.success) {
        document.getElementById('summary').textContent = detailJson.error || '주문을 찾을 수 없습니다.';
        return;
      }

      job = detailJson.job;
      document.getElementById('summary').textContent = `${job.customer_name || '-'} / ${job.start_address || '-'} → ${job.end_address || '-'}`;
      document.getElementById('price').textContent = `${Number(job.deposit_amount || 0).toLocaleString()}원`;

      try {
        const cfg = await fetch('/.netlify/functions/config').then(r => r.json());
        clientKey = cfg?.tossClientKey || '';
      } catch {}

      document.getElementById('btnPay').disabled = !job || !clientKey;
    }

    document.getElementById('btnPay').onclick = async () => {
      if (!job || !clientKey) return;
      const toss = TossPayments(clientKey);
      await toss.requestPayment('카드', {
        amount: Number(job.deposit_amount || 0),
        orderId: job.id,
        orderName: `DD운송 예약금`,
        customerName: job.customer_name || '고객',
        successUrl: `${location.origin}/customer/success.html?jobId=${encodeURIComponent(job.id)}`,
        failUrl: `${location.origin}/customer/fail.html?jobId=${encodeURIComponent(job.id)}`
      });
    };

    load();
  </script>
</body>
</html>
