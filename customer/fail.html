<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 실패</title>
  <style>
    body{font-family:Arial,sans-serif;padding:24px;background:#f8fafc;color:#0f172a}
    .card{max-width:640px;margin:0 auto;background:#fff;padding:24px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
    code{background:#f1f5f9;padding:2px 6px;border-radius:6px}
  </style>
</head>
<body>
<div class="card">
  <h1>결제 실패</h1>
  <p id="msg">다시 시도해주세요.</p>
</div>
<script>
const qs = new URLSearchParams(location.search);
const code = qs.get('code');
const message = qs.get('message');
if (code || message) {
  document.getElementById('msg').innerHTML = `오류 코드: <code>${code || '-'}</code><br>메시지: <code>${message || '-'}</code>`;
}
</script>
</body>
</html>
