[build]
  publish = "app"
  functions = "netlify/functions"

[dev]
  publish = "app"
  framework = "#static"
  functions = "netlify/functions"

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/driver"
  to = "/driver/accept.html"
  status = 301

[[redirects]]
  from = "/customer"
  to = "/customer/pay.html"
  status = 301

[[redirects]]
  from = "/yd"
  to = "/yd/"
  status = 301

[functions."expire-assignment"]
  schedule = "*/5 * * * *"

[functions."auto-dispatch"]
  schedule = "*/10 * * * *"

[functions."recompute-pricing"]
  schedule = "0 3 * * 1"
