# ── React SPA: 위에서 처리 안 된 모든 경로 → index.html ──
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# ── Scheduled functions ──
[functions."expire-assignment"]
  schedule = "*/5 * * * *"

[functions."auto-dispatch"]
  schedule = "*/10 * * * *"

[functions."recompute-pricing"]
  schedule = "0 3 * * 1"
