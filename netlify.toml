[build]
  command = "npm run build"
  publish = "app"
  functions = "netlify/functions"

[dev]
  command = "vite"
  targetPort = 5173
  port = 8888
  functions = "netlify/functions"

# ── 정적 서브디렉토리 (React 라우터에 막히지 않게 먼저 선언) ──
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/driver"
  to = "/driver/accept.html"
  status = 301

[[redirects]]
  from = "/customer"
  to = "/customer/pay.html"
  status = 301

# ── 기존 서비스 페이지 → React 채팅으로 통합 ──
[[redirects]]
  from = "/estimate"
  to = "/"
  status = 301

[[redirects]]
  from = "/estimate/"
  to = "/"
  status = 301

