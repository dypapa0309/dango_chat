<html lang="ko">
<head>

  <meta name="description" content="당고 주문 전체 결제를 진행하는 페이지입니다. 금액을 확인하고 바로 결제할 수 있습니다." />

    })(window,document,'script','dataLayer','GTM-PZCBT88P');

  <style>
    :root {
      --bg: #f5efe4;
      --card: #fffaf3;
      --line: rgba(70, 50, 31, 0.12);
      --text: #20170f;
      --muted: #6e6255;
      --brand: #ed6b2f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "SUIT", Arial, sans-serif;
      background: linear-gradient(180deg, #f8e6c3, #f7f3ec);
      color: var(--text);
      padding: 24px;
    }
    .card {
      max-width: 640px;
      margin: 0 auto;
      background: var(--card);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(77, 45, 13, 0.12);
    }
    .eyebrow { margin: 0 0 8px; color: #bc4d16; font-size: 13px; font-weight: 700; text-transform: uppercase; }
    h1 { margin: 0; font-size: 36px; line-height: 1.1; }
    .muted { color: var(--muted); line-height: 1.7; }
    .summary {
      margin-top: 22px;
      padding: 18px;
      border-radius: 18px;
      background: #fff;
      border: 1px solid var(--line);
    }
    .summary strong { display: block; margin-bottom: 8px; font-size: 18px; }
    .line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
    }
    .line:last-of-type { border-bottom: 0; }
    button, .ghost {
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    button {
      margin-top: 18px;
      background: var(--brand);
      color: #fff;
      box-shadow: 0 16px 28px rgba(237, 107, 47, 0.24);
    }
    .ghost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
      background: #fff;
      color: var(--muted);
      border: 1px solid var(--line);
      text-decoration: none;
    }
    .topnav {
      max-width: 640px;
      margin: 0 auto 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .topnav a {
      flex: 1;
      min-width: 120px;
      min-height: 46px;
      border-radius: 14px;
      background: rgba(255, 250, 243, 0.92);
      border: 1px solid var(--line);
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

</head>
<body data-analytics-page="customer_pay">
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PZCBT88P" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <nav class="topnav" aria-label="고객 이동 메뉴">
    <a href="/">홈화면</a>
    <a href="/estimate/">소형이사</a>
    <a href="/ddclean/">입주청소</a>
    <a href="/yd/">용달</a>
    <a href="/customer/lookup.html">주문조회</a>
  </nav>
  <div class="card">
    <p class="eyebrow">DANG-O PAYMENT</p>
    <h1>전문가 대금을 안전하게<br />당고가 보관 후 지급해요.</h1>
    <p class="muted">전문가 대금을 결제하시면 당고가 안전하게 금액을 보관 후, 서비스 완료 시 전문가에게 대금을 지급해요.</p>

    <div id="summaryCard" class="summary">
      <strong id="summary">불러오는 중...</strong>
      <div class="line"><span>결제 금액</span><span id="totalPrice">-</span></div>
    </div>

    <button id="btnPay" disabled>결제 준비 중...</button>
    <a class="ghost" href="/">처음으로 돌아가기</a>
  </div>

  <script>
    let job = null;
    let clientKey = '';

    const qs = new URLSearchParams(location.search);
    const jobId = qs.get('jobId');
    const draftId = qs.get('draftId');

    const money = (value) => `${Number(value || 0).toLocaleString()}원`;

    function getDraft() {
      if (!draftId) return null;
      const raw = localStorage.getItem(`dango:${draftId}`);
      if (!raw) return null;
      try {
        const parsed = JSON.parse(raw);
        const savedAt = parsed?.savedAt ? new Date(parsed.savedAt).getTime() : null;
        if (savedAt && Date.now() - savedAt > 7 * 24 * 60 * 60 * 1000) {
          localStorage.removeItem(`dango:${draftId}`);
          return null;
        }
        return parsed;
      } catch {
        return null;
      }
    }

    async function loadJob() {
      if (jobId) {
        const detailRes = await fetch(`/.netlify/functions/get-job-public?jobId=${encodeURIComponent(jobId)}`);
        const detailJson = await detailRes.json();
        if (!detailJson.success) throw new Error(detailJson.error || '주문을 찾을 수 없어요.');
        return detailJson.job;
      }

      const draft = getDraft();
      if (!draft) throw new Error('주문 정보가 없어요.');
      return draft;
    }

    async function load() {
      try {
        job = await loadJob();
        const SERVICE_LABEL = {
          move: '소형이사', clean: '입주청소', yd: '용달', waste: '폐기물',
          install: '설치', errand: '심부름', organize: '정리수납', ac_clean: '에어컨청소',
          appliance_clean: '가전청소', interior: '인테리어', interior_help: '인테리어 보조',
          pt: 'PT', vocal: '보컬', golf: '골프', tutor: '과외', counseling: '심리상담',
          marketing: '마케팅'
        };
        const serviceText = SERVICE_LABEL[job.service_type] || '';
        const addrText = job.end_address
          ? `${job.start_address || '-'} → ${job.end_address}`
          : (job.start_address || '-');
        const dateText = job.move_date ? ` / ${job.move_date}` : '';
        const servicePrefix = serviceText ? `[${serviceText}] ` : '';
        document.getElementById('summary').textContent = `${servicePrefix}${job.customer_name || '-'} / ${addrText}${dateText}`;
        document.getElementById('totalPrice').textContent = money(job.total_price || 0);

        try {
          const cfg = await fetch('/.netlify/functions/config').then((res) => res.json());
          clientKey = cfg?.tossClientKey || '';
        } catch {}

        const button = document.getElementById('btnPay');
        button.disabled = false;
        button.textContent = clientKey ? '토스로 전문가 대금 결제하기' : '모의 승인으로 계속하기';
      } catch (error) {
        document.getElementById('summary').textContent = error.message || '주문 정보를 불러오지 못했어요.';
      }
    }

    document.getElementById('btnPay').onclick = async () => {
      if (!job) return;
      const btn = document.getElementById('btnPay');
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = '결제창을 여는 중...';

      try {
        const successUrl = new URL(`${location.origin}/customer/success.html`);
        const failUrl = new URL(`${location.origin}/customer/fail.html`);

        if (jobId) {
          successUrl.searchParams.set('jobId', job.id);
          failUrl.searchParams.set('jobId', job.id);
        }
        if (draftId) {
          successUrl.searchParams.set('draftId', draftId);
          failUrl.searchParams.set('draftId', draftId);
        }

        successUrl.searchParams.set('amount', String(Number(job.total_price || 0)));

        if (!clientKey) {
          location.href = successUrl.toString();
          return;
        }

        const toss = TossPayments(clientKey);
        await toss.requestPayment('카드', {
          amount: Number(job.total_price || 0),
          orderId: job.id,
          orderName: '당고 전체 결제',
          customerName: job.customer_name || '고객',
          successUrl: successUrl.toString(),
          failUrl: failUrl.toString()
        });
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    };

    load();
  </script>
  <script src="../assets/js/contact-fab.js"></script>
  <script src="../assets/js/meta-pixel.js"></script>
  <script src="../assets/js/site-analytics.js"></script>
</body>
</html>
