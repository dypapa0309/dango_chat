<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>당고 | 결제 완료</title>
  <style>
    body {
      margin: 0;
      font-family: "SUIT", Arial, sans-serif;
      padding: 24px;
      background: linear-gradient(180deg, #f8e6c3, #f7f3ec);
      color: #20170f;
    }
    .card {
      max-width: 720px;
      margin: 0 auto;
      background: #fffaf3;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(77, 45, 13, 0.12);
      border: 1px solid rgba(70, 50, 31, 0.12);
    }
    .muted { color: #6e6255; line-height: 1.7; }
    .ok { color: #215a45; font-weight: 700; }
    .warn { color: #9a3412; font-weight: 700; }
    .err { color: #b91c1c; font-weight: 700; }
    .stack { display: grid; gap: 10px; margin-top: 16px; }
    .linkbox {
      margin-top: 18px;
      padding: 16px;
      border-radius: 16px;
      background: #fff;
      border: 1px solid rgba(70, 50, 31, 0.12);
      color: #6e6255;
      line-height: 1.7;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 14px;
      background: #ed6b2f;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>결제를 확인하고 있어요.</h1>
    <div class="stack">
      <p id="paymentStatus" class="muted">전체 결제 승인 상태를 확인하고 있어요.</p>
      <p id="dispatchStatus" class="muted">결제가 확인되면 자동 배차를 요청해요.</p>
    </div>
    <div id="completeLinkBox" class="linkbox" hidden>
      <strong style="display:block; color:#20170f; margin-bottom:8px;">고객 전용 링크</strong>
      <div id="completeLinkText">배차가 잡히면 고객 링크가 여기 보여요.</div>
      <a id="completeLinkAction" href="#" hidden>작업 완료 확인 페이지 열기</a>
      <a id="cancelLinkAction" href="#" hidden>작업 시작 전 취소 페이지 열기</a>
    </div>
    <a href="/estimate/">다른 견적도 계속 확인하기</a>
  </div>
<script>
(async () => {
  const qs = new URLSearchParams(location.search);
  const jobId = qs.get('jobId');
  const draftId = qs.get('draftId');
  const paymentKey = qs.get('paymentKey');
  const orderId = qs.get('orderId') || jobId || draftId;
  const amount = qs.get('amount');
  const paymentStatusEl = document.getElementById('paymentStatus');
  const dispatchStatusEl = document.getElementById('dispatchStatus');
  const completeLinkBox = document.getElementById('completeLinkBox');
  const completeLinkText = document.getElementById('completeLinkText');
  const completeLinkAction = document.getElementById('completeLinkAction');
  const cancelLinkAction = document.getElementById('cancelLinkAction');

  function loadDraft() {
    if (!draftId) return null;
    const raw = localStorage.getItem(`dango:${draftId}`);
    if (!raw) return null;
    try {
      return JSON.parse(raw);
    } catch {
      return null;
    }
  }

  try {
    if (jobId) {
      let finalAmount = amount;
      let detailJob = null;
      if (!finalAmount) {
        const detail = await fetch(`/.netlify/functions/get-job-detail?jobId=${encodeURIComponent(jobId)}`).then((r) => r.json());
        detailJob = detail.job || null;
        finalAmount = detail.job?.total_price || 0;
      }

      const confirmRes = await fetch('/.netlify/functions/confirm-toss-payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jobId, paymentKey, orderId, amount: Number(finalAmount) })
      });
      const confirmData = await confirmRes.json();
      if (!confirmData.success) throw new Error(confirmData.error || '결제 승인이 실패했어요.');

      paymentStatusEl.className = 'ok';
      paymentStatusEl.textContent = '전체 결제가 승인됐어요. 주문도 바로 확정됐어요.';

      const assignRes = await fetch('/.netlify/functions/assign-request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jobId })
      });
      const assignData = await assignRes.json();

      if (assignData.success) {
        dispatchStatusEl.className = 'ok';
        dispatchStatusEl.textContent = `자동 배차 요청이 들어갔어요. 현재 요청 기사: ${assignData.driver?.name || '확인 중'}`;
      } else {
        dispatchStatusEl.className = 'warn';
        dispatchStatusEl.textContent = assignData.error || '결제는 끝났지만 배차 요청은 다시 확인이 필요해요.';
      }

      if (!detailJob) {
        const detail = await fetch(`/.netlify/functions/get-job-detail?jobId=${encodeURIComponent(jobId)}`).then((r) => r.json());
        detailJob = detail.job || null;
      }

      if (detailJob?.customer_complete_token) {
        const completeUrl = `${location.origin}/customer/complete.html?token=${encodeURIComponent(detailJob.customer_complete_token)}`;
        completeLinkBox.hidden = false;
        completeLinkText.textContent = '작업이 끝나면 완료 확인 링크를 쓰면 돼요. 작업 시작 전 취소가 필요하면 취소 링크를 쓰면 돼요. 완료 확인이 끝나면 기사 정산 예정 80%가 승인돼요.';
        completeLinkAction.hidden = false;
        completeLinkAction.href = completeUrl;
      }
      if (detailJob?.customer_cancel_token) {
        const cancelUrl = `${location.origin}/customer/cancel.html?token=${encodeURIComponent(detailJob.customer_cancel_token)}`;
        completeLinkBox.hidden = false;
        cancelLinkAction.hidden = false;
        cancelLinkAction.href = cancelUrl;
      }

      return;
    }

    const draft = loadDraft();
    if (!draft) throw new Error('주문 정보가 없어요.');
    draft.payment_status = 'paid';
    draft.dispatch_status = 'requested';
    localStorage.setItem(`dango:${draftId}`, JSON.stringify(draft));

    paymentStatusEl.className = 'ok';
    paymentStatusEl.textContent = '모의 승인으로 전체 결제가 끝났어요.';
    dispatchStatusEl.className = 'warn';
    dispatchStatusEl.textContent = '지금은 로컬 초안 상태예요. 실운영에서는 결제 확인 뒤 자동 배차로 이어져요.';
  } catch (error) {
    paymentStatusEl.className = 'err';
    paymentStatusEl.textContent = error.message || '결제 승인이 실패했어요.';
    dispatchStatusEl.className = 'muted';
    dispatchStatusEl.textContent = '배차 요청은 아직 들어가지 않았어요.';
  }
})();
</script>
</body>
</html>
