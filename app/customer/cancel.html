<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>당고 | 주문 취소</title>
  <style>
    :root {
      --bg: #f5efe4;
      --card: #fffaf3;
      --line: rgba(70, 50, 31, 0.12);
      --text: #20170f;
      --muted: #6e6255;
      --brand: #ed6b2f;
      --danger: #b91c1c;
      --warn: #9a3412;
      --ok: #215a45;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "SUIT", Arial, sans-serif;
      padding: 24px;
      background: linear-gradient(180deg, #f8e6c3, #f7f3ec);
      color: var(--text);
    }
    .card {
      max-width: 760px;
      margin: 0 auto;
      background: var(--card);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(77, 45, 13, 0.12);
      border: 1px solid var(--line);
    }
    .eyebrow { margin: 0 0 8px; color: #bc4d16; font-size: 13px; font-weight: 700; text-transform: uppercase; }
    h1 { margin: 0; font-size: 36px; line-height: 1.1; }
    .muted { color: var(--muted); line-height: 1.7; }
    .warn { color: var(--warn); font-weight: 700; }
    .ok { color: var(--ok); font-weight: 700; }
    .summary {
      margin-top: 22px;
      padding: 18px;
      border-radius: 18px;
      background: #fff;
      border: 1px solid var(--line);
      display: grid;
      gap: 10px;
    }
    textarea {
      width: 100%;
      min-height: 120px;
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #fff;
      font: inherit;
      resize: vertical;
    }
    button, a {
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }
    button {
      margin-top: 18px;
      background: var(--danger);
      color: #fff;
      box-shadow: 0 16px 28px rgba(185, 28, 28, 0.16);
    }
    .ghost {
      margin-top: 10px;
      background: #fff;
      color: var(--muted);
      border: 1px solid var(--line);
    }
    .topnav {
      max-width: 760px;
      margin: 0 auto 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .topnav a {
      flex: 1;
      min-width: 120px;
      min-height: 46px;
      border-radius: 14px;
      background: rgba(255, 250, 243, 0.92);
      border: 1px solid var(--line);
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <nav class="topnav" aria-label="고객 이동 메뉴">
    <a href="/">홈화면</a>
    <a href="/estimate/">소형이사</a>
    <a href="/ddclean/">소형청소</a>
    <a href="/yd/">간편 용달</a>
    <a href="/customer/lookup.html">📄 주문조회</a>
  </nav>
  <div class="card">
    <p class="eyebrow">DANG-O CANCEL</p>
    <h1>작업 시작 전이라면<br />고객이 직접 취소할 수 있어요.</h1>
    <p id="statusText" class="muted">주문 정보를 불러오고 있어요.</p>

    <div id="summaryCard" class="summary">
      <div id="summaryMain">불러오는 중...</div>
      <div id="summaryAmount" class="muted"></div>
      <div class="muted">작업 시작 전 취소면 결제 취소도 같이 시도해요.</div>
      <div class="muted">이미 작업이 시작됐다면 자동 취소 대신 운영 확인이 필요해요.</div>
    </div>

    <textarea id="cancelReason" placeholder="취소 사유를 적어주세요. 비워도 취소할 수 있어요."></textarea>
    <button id="btnCancel" disabled>고객이 직접 취소하기</button>
    <a class="ghost" href="/estimate/">다른 견적 보기</a>
  </div>

  <script>
    const qs = new URLSearchParams(location.search);
    const token = qs.get('token');
    const statusText = document.getElementById('statusText');
    const summaryMain = document.getElementById('summaryMain');
    const summaryAmount = document.getElementById('summaryAmount');
    const reasonInput = document.getElementById('cancelReason');
    const button = document.getElementById('btnCancel');

    const money = (value) => `${Number(value || 0).toLocaleString()}원`;

    async function loadJob() {
      if (!token) {
        statusText.className = 'warn';
        statusText.textContent = '유효하지 않은 취소 링크예요.';
        return;
      }

      const res = await fetch(`/.netlify/functions/customer-cancel?token=${encodeURIComponent(token)}`);
      const data = await res.json();
      if (!data.success) {
        statusText.className = 'warn';
        statusText.textContent = data.error || '주문을 찾지 못했어요.';
        return;
      }

      const job = data.job;
      summaryMain.textContent = `${job.customer_name || '-'} / ${job.start_address || '-'} → ${job.end_address || '-'}`;
      summaryAmount.textContent = `전체 결제 ${money(job.total_price)} / 기사 정산 예정 ${money(job.driver_amount)}`;

      if (!data.cancelable) {
        statusText.className = 'warn';
        statusText.textContent = '이미 작업이 시작됐거나 끝나서 자동 취소가 어려워요.';
        button.disabled = true;
        button.textContent = '자동 취소 어려움';
        return;
      }

      statusText.className = 'muted';
      statusText.textContent = '작업 시작 전이면 아래 버튼으로 취소와 환불을 진행할 수 있어요.';
      button.disabled = false;
    }

    button.onclick = async () => {
      if (!token) return;
      button.disabled = true;
      button.textContent = '취소 처리 중이에요...';

      const res = await fetch('/.netlify/functions/customer-cancel', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, reason: reasonInput.value.trim() })
      });
      const data = await res.json();

      if (!data.success) {
        statusText.className = 'warn';
        statusText.textContent = data.error || '취소 처리에 실패했어요.';
        button.disabled = false;
        button.textContent = '고객이 직접 취소하기';
        return;
      }

      statusText.className = 'ok';
      statusText.textContent = data.refunded
        ? '취소와 결제 취소가 접수됐어요.'
        : '취소가 접수됐어요.';
      button.textContent = '취소 완료';
    };

    loadJob();
  </script>
  <script src="../assets/js/contact-fab.js"></script>
</body>
</html>
