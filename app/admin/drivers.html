<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>당고 기사 관리</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-admin-page="drivers">
  <section id="adminGate" class="admin-gate">
    <form id="adminGateForm" class="admin-gate-card">
      <p class="admin-eyebrow">DANG-O ADMIN</p>
      <h1>운영 비밀번호를 입력해주세요.</h1>
      <p class="muted">운영툴은 비밀번호가 있어야 열립니다.</p>
      <input id="adminTokenInput" type="password" placeholder="운영 비밀번호" autocomplete="current-password" />
      <button class="btn primary" type="submit">운영툴 열기</button>
      <p id="adminGateMessage" class="muted"></p>
    </form>
  </section>

  <div id="adminApp" hidden>
    <header class="topbar">
      <div>
        <h1>당고 기사 관리</h1>
        <p>기사 가입, 계약 완료, 정산 계좌를 관리합니다.</p>
        <p class="topbar-note">배차 가능 기사만 따로 확인하고, 개별 가입 링크도 여기서 보낼 수 있습니다.</p>
      </div>
      <div class="actions-inline">
        <button id="btnRefresh" class="btn">새로고침</button>
        <button id="btnLogout" class="btn">로그아웃</button>
      </div>
    </header>

    <nav class="admin-nav">
      <a class="admin-link" href="/admin/">주문 운영</a>
      <a class="admin-link is-active" href="/admin/drivers.html">기사 관리</a>
      <a class="admin-link" href="/admin/finance.html">정산 · 가격</a>
    </nav>

    <main class="layout layout-secondary admin-page">
      <section class="panel">
        <div class="panel-head"><h2>배차 가능 기사</h2><span id="eligibleDriverCount">0명</span></div>
        <div id="eligibleDriverSummary" class="mini-card muted">기사를 불러오고 있습니다.</div>
        <div id="eligibleDriverList" class="stack-list compact"></div>
      </section>

      <section class="panel panel-wide">
        <div class="panel-head"><h2>기사 관리</h2><span id="driverCount">0명</span></div>
        <p class="muted">기존 등록 기사별 가입 마무리, 계약 완료 상태, 계좌 정보, 정산 가능 여부를 관리합니다.</p>
        <div id="driverList" class="stack-list"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase.js"></script>
  <script src="./app.js"></script>
</body>
</html>
